<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Practical 5 - Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { text-align: center; }

    h1 {
      font-size: 28px;
      color: #58a6ff;
      margin-bottom: 4px;
    }

    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 24px; }

    /* Score Board */
    .scoreboard {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .score-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px 24px;
      min-width: 80px;
    }

    .score-card .player-label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
    .score-card .score-value  { font-size: 26px; font-weight: 700; }
    .score-card.x-card  .score-value { color: #58a6ff; }
    .score-card.o-card  .score-value { color: #f78166; }
    .score-card.tie-card .score-value { color: #8b949e; }

    /* Status */
    .status {
      font-size: 16px;
      margin-bottom: 16px;
      height: 24px;
      color: #e6edf3;
    }

    .status .x-turn  { color: #58a6ff; font-weight: 700; }
    .status .o-turn  { color: #f78166; font-weight: 700; }
    .status .winner  { color: #3fb950; font-weight: 700; font-size: 18px; }
    .status .draw    { color: #8b949e; font-weight: 700; }

    /* Game Board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows:    repeat(3, 100px);
      gap: 6px;
      margin: 0 auto 20px;
      width: fit-content;
    }

    .cell {
      background: #161b22;
      border: 2px solid #30363d;
      border-radius: 10px;
      font-size: 44px;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #21262d;
      transform: scale(1.04);
    }

    .cell.x { color: #58a6ff; }
    .cell.o { color: #f78166; }
    .cell.taken { cursor: default; }

    /* Winning cells highlight */
    .cell.winning {
      background: #1a3a1a;
      border-color: #3fb950;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .restart-btn { background: #238636; color: white; }
    .reset-btn   { background: #da3633; color: white; }
    button:hover { opacity: 0.85; }

    /* Mode selector */
    .mode-row {
      margin-bottom: 16px;
    }

    .mode-row label { font-size: 13px; color: #8b949e; margin-right: 10px; }

    .mode-row select {
      background: #161b22;
      color: white;
      border: 1px solid #30363d;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>❌⭕ Tic Tac Toe</h1>
  <p class="subtitle">Classic 3×3 game — built with pure JavaScript</p>

  <!-- Game Mode -->
  <div class="mode-row">
    <label>Game Mode:</label>
    <select id="modeSelect" onchange="changeMode()">
      <option value="pvp">👥 Player vs Player</option>
      <option value="ai">🤖 Player vs AI</option>
    </select>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-card x-card">
      <div class="player-label" id="xLabel">Player X</div>
      <div class="score-value" id="xScore">0</div>
    </div>
    <div class="score-card tie-card">
      <div class="player-label">Draws</div>
      <div class="score-value" id="tieScore">0</div>
    </div>
    <div class="score-card o-card">
      <div class="player-label" id="oLabel">Player O</div>
      <div class="score-value" id="oScore">0</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status" id="status">
    <span class="x-turn">X's turn</span>
  </div>

  <!-- Board -->
  <div class="board" id="board">
    <div class="cell" data-i="0" onclick="cellClick(0)"></div>
    <div class="cell" data-i="1" onclick="cellClick(1)"></div>
    <div class="cell" data-i="2" onclick="cellClick(2)"></div>
    <div class="cell" data-i="3" onclick="cellClick(3)"></div>
    <div class="cell" data-i="4" onclick="cellClick(4)"></div>
    <div class="cell" data-i="5" onclick="cellClick(5)"></div>
    <div class="cell" data-i="6" onclick="cellClick(6)"></div>
    <div class="cell" data-i="7" onclick="cellClick(7)"></div>
    <div class="cell" data-i="8" onclick="cellClick(8)"></div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="restart-btn" onclick="restartGame()">🔄 New Round</button>
    <button class="reset-btn"   onclick="resetAll()">🗑 Reset Score</button>
  </div>
</div>

<script>
  // ===== GAME STATE =====
  let board       = Array(9).fill(null); // null | 'X' | 'O'
  let currentPlayer = 'X';
  let gameOver    = false;
  let scores      = { X: 0, O: 0, tie: 0 };
  let mode        = 'pvp'; // 'pvp' or 'ai'

  // All winning combinations (index triplets)
  const WIN_COMBOS = [
    [0,1,2], [3,4,5], [6,7,8], // rows
    [0,3,6], [1,4,7], [2,5,8], // cols
    [0,4,8], [2,4,6]            // diagonals
  ];

  // ===== CELL CLICK =====
  function cellClick(index) {
    if (gameOver || board[index]) return;

    makeMove(index, currentPlayer);

    if (!gameOver && mode === 'ai' && currentPlayer === 'O') {
      // Slight delay so it feels more natural
      setTimeout(aiMove, 300);
    }
  }

  // ===== MAKE A MOVE =====
  function makeMove(index, player) {
    board[index] = player;

    const cell = document.querySelectorAll('.cell')[index];
    cell.textContent = player;
    cell.classList.add(player.toLowerCase(), 'taken');

    const result = checkWinner();

    if (result === 'win') {
      highlightWinner();
      scores[currentPlayer]++;
      updateScores();
      setStatus(`<span class="winner">🎉 Player ${currentPlayer} wins!</span>`);
      gameOver = true;
    } else if (result === 'draw') {
      scores.tie++;
      updateScores();
      setStatus(`<span class="draw">🤝 It's a draw!</span>`);
      gameOver = true;
    } else {
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      const color = currentPlayer === 'X' ? 'x-turn' : 'o-turn';
      setStatus(`<span class="${color}">${mode === 'ai' && currentPlayer === 'O' ? "🤖 AI's turn..." : currentPlayer + "'s turn"}</span>`);
    }
  }

  // ===== CHECK WINNER =====
  function checkWinner() {
    for (const combo of WIN_COMBOS) {
      const [a, b, c] = combo;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return 'win';
      }
    }
    if (board.every(cell => cell !== null)) return 'draw';
    return null;
  }

  // ===== HIGHLIGHT WINNING CELLS =====
  function highlightWinner() {
    const cells = document.querySelectorAll('.cell');
    for (const combo of WIN_COMBOS) {
      const [a, b, c] = combo;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        cells[a].classList.add('winning');
        cells[b].classList.add('winning');
        cells[c].classList.add('winning');
        return;
      }
    }
  }

  // ===== AI MOVE (Simple Minimax) =====
  function aiMove() {
    if (gameOver) return;

    const best = minimax(board, 'O');
    makeMove(best.index, 'O');
  }

  function minimax(boardState, player) {
    const winner = getWinner(boardState);
    if (winner === 'O') return { score:  10 };
    if (winner === 'X') return { score: -10 };
    if (boardState.every(c => c !== null)) return { score: 0 };

    const moves = [];
    for (let i = 0; i < 9; i++) {
      if (!boardState[i]) {
        const newBoard = [...boardState];
        newBoard[i] = player;
        const result = minimax(newBoard, player === 'O' ? 'X' : 'O');
        moves.push({ index: i, score: result.score });
      }
    }

    // O maximizes, X minimizes
    let best;
    if (player === 'O') {
      best = moves.reduce((a, b) => a.score >= b.score ? a : b);
    } else {
      best = moves.reduce((a, b) => a.score <= b.score ? a : b);
    }
    return best;
  }

  function getWinner(boardState) {
    for (const [a, b, c] of WIN_COMBOS) {
      if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
        return boardState[a];
      }
    }
    return null;
  }

  // ===== UI HELPERS =====
  function setStatus(html) {
    document.getElementById('status').innerHTML = html;
  }

  function updateScores() {
    document.getElementById('xScore').textContent   = scores.X;
    document.getElementById('oScore').textContent   = scores.O;
    document.getElementById('tieScore').textContent = scores.tie;
  }

  function restartGame() {
    board         = Array(9).fill(null);
    currentPlayer = 'X';
    gameOver      = false;

    document.querySelectorAll('.cell').forEach(cell => {
      cell.textContent = '';
      cell.className   = 'cell';
    });

    setStatus(`<span class="x-turn">X's turn</span>`);
  }

  function resetAll() {
    scores = { X: 0, O: 0, tie: 0 };
    updateScores();
    restartGame();
  }

  function changeMode() {
    mode = document.getElementById('modeSelect').value;

    // Update labels
    document.getElementById('oLabel').textContent = mode === 'ai' ? '🤖 AI' : 'Player O';
    resetAll();
  }
</script>

</body>
</html>
