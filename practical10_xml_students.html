<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Practical 10 - XML Student Details Viewer</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      padding: 28px 20px;
      min-height: 100vh;
    }

    h1 {
      font-size: 22px;
      color: #38bdf8;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 28px;
    }

    /* XML Tabs */
    .tab-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 8px 20px;
      border: 1.5px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #0284c7;
      border-color: #0284c7;
      color: white;
    }

    /* Student Cards */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .student-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .student-name {
      font-size: 18px;
      font-weight: 700;
      color: #e2e8f0;
    }

    .reg-badge {
      background: #0f172a;
      border: 1px solid #38bdf8;
      color: #38bdf8;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
    }

    .card-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .row-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .row-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .row-value {
      font-size: 13px;
      color: #cbd5e1;
    }

    /* XML Source View */
    .xml-source {
      max-width: 900px;
      margin: 0 auto;
      display: none;
    }

    .xml-source.show { display: block; }
    .cards-grid-wrap { display: block; }
    .cards-grid-wrap.hide { display: none; }

    .code-block {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      overflow-x: auto;
      margin-bottom: 16px;
    }

    .xml-tag    { color: #7ee787; }
    .xml-attr   { color: #79c0ff; }
    .xml-value  { color: #a5d6ff; }
    .xml-text   { color: #ffa657; }
    .xml-comment{ color: #8b949e; font-style: italic; }

    h3 { font-size: 15px; color: #38bdf8; margin: 20px 0 10px; }
  </style>
</head>
<body>

  <h1>📋 Student Details XML</h1>
  <p class="subtitle">XML document with XSD schema validation — Practical 10</p>

  <!-- Toggle Tabs -->
  <div class="tab-row">
    <button class="tab-btn active" onclick="showTab('cards')">👁 View Data</button>
    <button class="tab-btn"        onclick="showTab('xml')">📄 XML Source</button>
    <button class="tab-btn"        onclick="showTab('xsd')">✅ XSD Schema</button>
  </div>

  <!-- CARDS VIEW -->
  <div class="cards-grid-wrap" id="cardsWrap">
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <!-- XML SOURCE -->
  <div class="xml-source" id="xmlWrap">
    <h3>students.xml</h3>
    <div class="code-block" id="xmlSource"></div>
  </div>

  <!-- XSD SOURCE -->
  <div class="xml-source" id="xsdWrap">
    <h3>students.xsd (Schema)</h3>
    <div class="code-block" id="xsdSource"></div>
  </div>

<script>
  // ===== STUDENT DATA (mirrors the XML) =====
  const students = [
    {
      reg_no: "VIT2023001",
      first_name: "Himalaya",  last_name: "Yadav",
      department: "Computer Science and Engineering",
      address:    "Block C, VIT Bhopal Campus, Bhopal, MP - 466114",
      phone:      "987-1234"
    },
    {
      reg_no: "VIT2023002",
      first_name: "Ananya", last_name: "Sharma",
      department: "Electronics and Communication Engineering",
      address:    "Hostel Block A, VIT Bhopal Campus, Bhopal, MP - 466114",
      phone:      "876-5432"
    },
    {
      reg_no: "VIT2023003",
      first_name: "Rohit", last_name: "Verma",
      department: "Mechanical Engineering",
      address:    "Flat 12, Shanti Nagar, Indore, MP - 452001",
      phone:      "765-9876"
    },
    {
      reg_no: "VIT2023004",
      first_name: "Priya", last_name: "Singh",
      department: "Civil Engineering",
      address:    "House 7, Green Colony, Bhopal, MP - 462001",
      phone:      "654-3210"
    }
  ];

  // ===== RENDER CARDS =====
  const grid = document.getElementById('cardsGrid');
  students.forEach(s => {
    grid.innerHTML += `
      <div class="student-card">
        <div class="card-header">
          <div class="student-name">${s.first_name} ${s.last_name}</div>
          <div class="reg-badge">${s.reg_no}</div>
        </div>
        <div class="card-row">
          <span class="row-icon">🏫</span>
          <div>
            <div class="row-label">Department</div>
            <div class="row-value">${s.department}</div>
          </div>
        </div>
        <div class="card-row">
          <span class="row-icon">📍</span>
          <div>
            <div class="row-label">Address</div>
            <div class="row-value">${s.address}</div>
          </div>
        </div>
        <div class="card-row">
          <span class="row-icon">📞</span>
          <div>
            <div class="row-label">Phone (XXX-XXXX)</div>
            <div class="row-value">${s.phone}</div>
          </div>
        </div>
      </div>`;
  });

  // ===== XML SOURCE =====
  const xmlCode = `<span class="xml-comment">&lt;!-- students.xml --&gt;</span>
<span class="xml-tag">&lt;student_details&gt;</span>

  <span class="xml-comment">&lt;!-- student element: reg_no is an ATTRIBUTE --&gt;</span>
  <span class="xml-tag">&lt;student</span> <span class="xml-attr">reg_no</span>=<span class="xml-value">"VIT2023001"</span><span class="xml-tag">&gt;</span>
    <span class="xml-comment">&lt;!-- Name is GROUPED in &lt;n&gt; element --&gt;</span>
    <span class="xml-tag">&lt;n&gt;</span>
      <span class="xml-tag">&lt;first_name&gt;</span><span class="xml-text">Himalaya</span><span class="xml-tag">&lt;/first_name&gt;</span>
      <span class="xml-tag">&lt;last_name&gt;</span><span class="xml-text">Yadav</span><span class="xml-tag">&lt;/last_name&gt;</span>
    <span class="xml-tag">&lt;/n&gt;</span>
    <span class="xml-tag">&lt;department&gt;</span><span class="xml-text">Computer Science and Engineering</span><span class="xml-tag">&lt;/department&gt;</span>
    <span class="xml-tag">&lt;address&gt;</span><span class="xml-text">Block C, VIT Bhopal Campus, Bhopal</span><span class="xml-tag">&lt;/address&gt;</span>
    <span class="xml-tag">&lt;phone&gt;</span><span class="xml-text">987-1234</span><span class="xml-tag">&lt;/phone&gt;</span>
  <span class="xml-tag">&lt;/student&gt;</span>

  <span class="xml-comment">&lt;!-- ... more students ... --&gt;</span>

<span class="xml-tag">&lt;/student_details&gt;</span>`;

  document.getElementById('xmlSource').innerHTML = xmlCode;

  // ===== XSD SOURCE =====
  const xsdCode = `<span class="xml-comment">&lt;!-- Phone Pattern: exactly XXX-XXXX where X is a digit --&gt;</span>
<span class="xml-tag">&lt;xs:simpleType</span> <span class="xml-attr">name</span>=<span class="xml-value">"PhoneType"</span><span class="xml-tag">&gt;</span>
  <span class="xml-tag">&lt;xs:restriction</span> <span class="xml-attr">base</span>=<span class="xml-value">"xs:string"</span><span class="xml-tag">&gt;</span>
    <span class="xml-tag">&lt;xs:pattern</span> <span class="xml-attr">value</span>=<span class="xml-value">"\\d{3}-\\d{4}"</span><span class="xml-tag">/&gt;</span>
  <span class="xml-tag">&lt;/xs:restriction&gt;</span>
<span class="xml-tag">&lt;/xs:simpleType&gt;</span>

<span class="xml-comment">&lt;!-- reg_no as required ATTRIBUTE --&gt;</span>
<span class="xml-tag">&lt;xs:attribute</span> <span class="xml-attr">name</span>=<span class="xml-value">"reg_no"</span> <span class="xml-attr">type</span>=<span class="xml-value">"xs:string"</span> <span class="xml-attr">use</span>=<span class="xml-value">"required"</span><span class="xml-tag">/&gt;</span>

<span class="xml-comment">&lt;!-- Name grouped as complex type --&gt;</span>
<span class="xml-tag">&lt;xs:complexType</span> <span class="xml-attr">name</span>=<span class="xml-value">"NameType"</span><span class="xml-tag">&gt;</span>
  <span class="xml-tag">&lt;xs:sequence&gt;</span>
    <span class="xml-tag">&lt;xs:element</span> <span class="xml-attr">name</span>=<span class="xml-value">"first_name"</span> <span class="xml-attr">type</span>=<span class="xml-value">"xs:string"</span><span class="xml-tag">/&gt;</span>
    <span class="xml-tag">&lt;xs:element</span> <span class="xml-attr">name</span>=<span class="xml-value">"last_name"</span>  <span class="xml-attr">type</span>=<span class="xml-value">"xs:string"</span><span class="xml-tag">/&gt;</span>
  <span class="xml-tag">&lt;/xs:sequence&gt;</span>
<span class="xml-tag">&lt;/xs:complexType&gt;</span>`;

  document.getElementById('xsdSource').innerHTML = xsdCode;

  // ===== TAB SWITCHING =====
  function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.remove('active');
      if (['cards','xml','xsd'][i] === tab) b.classList.add('active');
    });
    document.getElementById('cardsWrap').className = 'cards-grid-wrap' + (tab === 'cards' ? '' : ' hide');
    document.getElementById('xmlWrap').className   = 'xml-source' + (tab === 'xml' ? ' show' : '');
    document.getElementById('xsdWrap').className   = 'xml-source' + (tab === 'xsd' ? ' show' : '');
  }
</script>
</body>
</html>
